<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il Bosco dell'Angelo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #f4fbf7;
      display: flex; flex-direction: column;
      align-items: center; justify-content: space-between;
      overflow: hidden;
    }

    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(58,170,120,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 100% 100%, rgba(46,139,94,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* HEADER */
    .header {
      width: 100%; text-align: center; padding: 2rem 1rem 0;
      z-index: 10; opacity: 0; transition: opacity 0.8s ease;
    }
    .header a { text-decoration: none; display: inline-block; }
    .header h1 {
      font-family: 'Cinzel', serif; font-weight: 400;
      font-size: clamp(0.75rem, 3vw, 0.95rem);
      letter-spacing: 0.28em; text-transform: uppercase;
      color: #2e8b5e; line-height: 1.7;
    }
    .header-line {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin: 0.5rem auto;
    }
    .header-line::before, .header-line::after {
      content: ''; width: 40px; height: 1px; background: #3aaa78; opacity: 0.45;
    }
    .leaf-dot {
      width: 6px; height: 6px; background: #3aaa78;
      border-radius: 0 50% 0 50%; transform: rotate(45deg); opacity: 0.6;
    }

    /* SCENE */
    .scene {
      flex: 1; display: flex; align-items: center;
      justify-content: center; width: 100%;
      perspective: 1200px;
    }

    /* FLIP WRAPPER — this is what rotates */
    .flip-wrap {
      width: 260px;
      height: 170px;
      position: relative;
      transform-style: preserve-3d;
      /* Step 1: drop in, Step 2: flip */
      animation:
        dropIn  0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.4s both,
        flipIt  0.9s cubic-bezier(0.4,  0, 0.2,  1) 1.6s both;
    }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(-30px) scale(0.88); }
      to   { opacity: 1; transform: translateY(0)     scale(1); }
    }

    @keyframes flipIt {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(180deg); }
    }

    /* SHARED FACE STYLES */
    .face {
      position: absolute; inset: 0;
      border-radius: 8px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* FRONT — green side shown first */
    .front {
      background: linear-gradient(135deg, #3aaa78 0%, #2e8b5e 100%);
      box-shadow: 0 10px 40px rgba(46,139,94,0.28), 0 2px 10px rgba(0,0,0,0.08);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .front::before {
      content: '';
      position: absolute; inset: -50%;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 12px,
        rgba(255,255,255,0.05) 12px, rgba(255,255,255,0.05) 13px
      );
    }
    .front-border {
      position: absolute; inset: 9px;
      border: 1px solid rgba(255,255,255,0.22); border-radius: 4px;
      pointer-events: none;
    }
    .front-logo { position: relative; z-index: 1; width: 90px; height: 90px; object-fit: contain; }

    /* BACK — white, pre-rotated 180deg so it shows correctly after flip */
    .back {
      background: #ffffff;
      transform: rotateY(180deg);   /* ← key: pre-rotated so it faces forward after flip */
      box-shadow: 0 10px 40px rgba(46,139,94,0.15), 0 2px 10px rgba(0,0,0,0.06);
      border: 1px solid rgba(46,139,94,0.15);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem 1.8rem; gap: 0;
    }
    .back-eyebrow {
      font-family: 'Cinzel', serif; font-size: 0.4rem;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: #3aaa78; margin-bottom: 0.9rem; opacity: 0.8;
    }
    .back-message {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.9rem, 8vw, 2.7rem);
      font-weight: 300; font-style: italic;
      color: #1a3d2b; line-height: 1.2; text-align: center;
    }
    .back-rule {
      width: 28px; height: 1px; background: #c8ead9; margin-top: 0.9rem;
    }

    /* FOOTER */
    .footer {
      width: 100%; text-align: center; padding: 0 1rem 2rem;
      z-index: 10; opacity: 0; transition: opacity 0.8s ease;
    }
    .footer a { display: inline-block; transition: opacity 0.2s; }
    .footer a:active { opacity: 0.6; }
    .logo-svg { width: 72px; height: 72px; opacity: 0.85; }
  </style>
</head>
<body>

<header class="header" id="hdr">
  <a href="https://www.instagram.com/boscodellangelo?igsh=ZGlqdDZ0dWFkN3dw">
    <h1>Il Bosco<br>dell'Angelo</h1>
  </a>
  <div class="header-line"><div class="leaf-dot"></div></div>
</header>

<div class="scene">
  <div class="flip-wrap">

    <!-- FRONT: green with logo -->
    <div class="face front">
      <div class="front-border"></div>
      <img class="front-logo" src="logo.png" alt="Il Bosco dell'Angelo">
    </div>

    <!-- BACK: message -->
    <div class="face back">
      <div class="back-eyebrow">il tuo messaggio</div>
      <div class="back-message" id="msg"></div>
      <div class="back-rule"></div>
    </div>

  </div>
</div>

<footer class="footer" id="ftr">
  <a href="https://www.instagram.com/boscodellangelo?igsh=ZGlqdDZ0dWFkN3dw">
    <img class="logo-svg" src="logo.png" alt="Il Bosco dell'Angelo">
  </a>
</footer>

<script>
  const messages = ["Ciao", "Come stai?", "Stai bene!"];
  document.getElementById('msg').textContent = messages[Math.floor(Math.random() * messages.length)];

  setTimeout(() => {
    document.getElementById('hdr').style.opacity = '1';
    document.getElementById('ftr').style.opacity = '1';
  }, 2700);
</script>
</body>
</html>
